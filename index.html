<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Artela">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7a6550">
<title>Artela Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--bg2:#ede6d8;--bg3:#e4dace;
  --border:rgba(90,65,40,.12);--border2:rgba(90,65,40,.25);
  --text:#3a2c1e;--text2:#7a6550;--text3:#a89880;
  --accent:#7a6550;--accent2:#5c4a36;
  --dany:#4a7fa0;--sarah:#a05a3a;--green:#5a8a4a;--red:#a04040;
  --radius:14px;--radius-sm:9px;--shadow:0 1px 4px rgba(90,65,40,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.top-bar{background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top,0px) + 10px);}
.logo-wrap{display:flex;justify-content:center;align-items:center;padding:0 18px 12px;}
.logo-img{height:48px;width:auto;display:block;}
.header-bottom{padding:0 18px;}
.progress-wrap{margin-bottom:10px;}
.progress-track{height:3px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-row{display:flex;justify-content:space-between;margin-top:4px;}
.progress-label{font-size:11px;color:var(--text3);letter-spacing:.03em;}
.who-row{display:flex;gap:7px;margin-bottom:10px;}
.who-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .18s;}
.who-btn.active-dany{background:rgba(74,127,160,.15);border-color:var(--dany);color:var(--dany);}
.who-btn.active-sarah{background:rgba(160,90,58,.15);border-color:var(--sarah);color:var(--sarah);}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.list-wrap{flex:1;overflow-y:auto;padding:0 18px 8px;scrollbar-width:none;}
.list-wrap::-webkit-scrollbar{display:none;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px;position:sticky;top:0;background:var(--bg);z-index:1;}
.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);flex:1;}
.section-actions{display:flex;gap:4px;}
.sec-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:2px 5px;border-radius:4px;font-family:'DM Sans',sans-serif;}
.task-card{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:var(--radius);border:1px solid var(--border);background:#fff;margin-bottom:6px;transition:border-color .15s,opacity .2s,transform .15s;box-shadow:var(--shadow);-webkit-user-select:none;user-select:none;}
.task-card.dragging{opacity:.5;transform:scale(.98);border-color:var(--accent);}
.task-card.drag-over{border-color:var(--accent);border-style:dashed;}
.task-card.done{opacity:.35;}
.task-card.done .task-text{text-decoration:line-through;}
.drag-handle{display:flex;flex-direction:column;gap:3px;justify-content:center;cursor:grab;flex-shrink:0;padding:2px 4px 2px 0;touch-action:none;}
.drag-dot{width:14px;height:2px;background:var(--text3);border-radius:2px;}
.check-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;}
.task-card.done .check-circle{background:var(--green);border-color:var(--green);}
.check-circle svg{display:none;}
.task-card.done .check-circle svg{display:block;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:14px;color:var(--text);line-height:1.4;}
.task-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.tag-dany{background:rgba(74,127,160,.13);color:var(--dany);}
.tag-sarah{background:rgba(160,90,58,.13);color:var(--sarah);}
.tag-ambas{background:rgba(90,138,74,.13);color:var(--green);}
.tag-urgent{background:rgba(160,64,64,.13);color:var(--red);}
.tag-by{font-size:10px;color:var(--text3);font-style:italic;}
.task-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 3px;line-height:1;}
.add-panel{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 18px;padding-bottom:calc(env(safe-area-inset-bottom,0px)+12px);}
.add-input-row{display:flex;gap:7px;margin-bottom:7px;}
.add-input{flex:1;background:#fff;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;box-shadow:var(--shadow);}
.add-input::placeholder{color:var(--text3);}
.add-input:focus{border-color:var(--accent);}
.add-submit{background:var(--accent);border:none;border-radius:var(--radius-sm);padding:9px 16px;font-size:20px;color:#fff;cursor:pointer;flex-shrink:0;line-height:1;}
.add-selects{display:flex;gap:7px;}
.add-select{flex:1;background:#fff;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 9px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);outline:none;appearance:none;-webkit-appearance:none;box-shadow:var(--shadow);}
.bottom-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.add-cat-btn{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;}
.sync-btn{background:none;border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 10px;}
.status-bar{font-size:11px;text-align:center;padding:3px;min-height:20px;color:var(--text3);transition:all .3s;}
.status-bar.ok{color:var(--green);}
.status-bar.err{color:var(--red);}
.status-bar.loading{color:var(--accent);}
.overlay{display:none;position:fixed;inset:0;background:rgba(58,44,30,.4);z-index:50;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg);border-radius:18px 18px 0 0;padding:20px 18px;padding-bottom:calc(env(safe-area-inset-bottom,0px)+20px);width:100%;max-width:480px;}
.modal-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:14px;}
.modal-input{width:100%;background:#fff;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:10px;box-shadow:var(--shadow);}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
.modal-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-btn.cancel{background:var(--bg2);color:var(--text2);}
.empty{color:var(--text3);font-size:14px;padding:30px 0;text-align:center;line-height:2;}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
.loading-screen.hidden{display:none;}
.loading-logo{height:56px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.loading-text{font-size:13px;color:var(--text3);}
@keyframes spin{to{transform:rotate(360deg);}}
.install-hint{display:none;background:var(--accent);color:#fff;padding:9px 16px;font-size:12px;align-items:center;justify-content:center;gap:8px;}
.install-hint.show{display:flex;}
.install-hint button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;}
</style>
</head>

// ---- STATUS ----
function setStatus(msg,type=''){
  const el=document.getElementById('status-bar');

}

// ---- API: usa GET con params para evitar CORS ----
async function apiCall(params){
  const url=new URL(API);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,typeof v==='object'?JSON.stringify(v):v));
  const res=await fetch(url.toString());
  return res.json();
}

async function apiLoad(){
  return apiCall({action:'load'});
}

async function apiSave(){
  return apiCall({action:'save', tasks:tasks, sections:sections});
}

// ---- SYNC ----
async function syncNow(silent=false){
  if(isSyncing)return;
  isSyncing=true;
  if(!silent)setStatus('Sincronizando...','loading');
  try{
    const data=await apiLoad();
    if(data.tasks&&data.tasks.length>0){
      tasks=data.tasks;
      nextId=Math.max(...tasks.map(t=>t.id),99)+1;
    }
    if(data.sections&&data.sections.length>0) sections=data.sections;
    rebuildSelects();render();
    if(!silent){setStatus('Sincronizado ✓','ok');setTimeout(()=>setStatus(''),3000);}
  }catch(e){
    if(!silent){setStatus('Sin conexion','err');setTimeout(()=>setStatus(''),4000);}
  }
  isSyncing=false;
}

function scheduleSave(){
  render();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    setStatus('Guardando...','loading');
    try{
      await apiSave();
      setStatus('Guardado ✓','ok');
      setTimeout(()=>setStatus(''),3000);
    }catch(e){
      setStatus('Error al guardar','err');
      setTimeout(()=>setStatus(''),4000);
    }
  },600);
}

// ---- INIT ----
async function init(){
  sections=JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
  tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
  rebuildSelects();

  try{
    document.getElementById('loading-text').textContent='Cargando datos...';
    const data=await apiLoad();
    if(data.tasks&&data.tasks.length>0){
      tasks=data.tasks;
      nextId=Math.max(...tasks.map(t=>t.id),99)+1;
    } else {
      // First time: save defaults to sheet
      document.getElementById('loading-text').textContent='Guardando datos iniciales...';
      await apiSave();
    }
    if(data.sections&&data.sections.length>0) sections=data.sections;
    rebuildSelects();
  }catch(e){
    setStatus('Sin conexion - datos de ejemplo','err');
    setTimeout(()=>setStatus(''),4000);
  }

  document.getElementById('loading-screen').classList.add('hidden');
  render();
  // Auto-sync cada 30s
  setInterval(()=>syncNow(true),30000);
}

function rebuildSelects(){
  ['new-cat','edit-cat'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    sel.innerHTML=sections.map(s=>`<option value="${s.id}">${s.label}</option>`).join('');
  });
}

function setUser(u){
  currentUser=u;
  document.getElementById('btn-dany').className='who-btn'+(u==='dany'?' active-dany':'');
  document.getElementById('btn-sarah').className='who-btn'+(u==='sarah'?' active-sarah':'');
  document.getElementById('new-assigned').value=u;
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-chip').forEach(b=>{
    const m={todas:'Todas',pendientes:'Pendientes',urgente:'Urgentes',dany:'De Dany',sarah:'De Sarah',ambas:'Ambas'};
    b.classList.toggle('active',m[f]===b.textContent);
  });
  render();
}

function toggle(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  t.done=!t.done;
  if(currentUser)t.doneBy=t.done?currentUser:'';
  scheduleSave();
}

function delTask(id,e){
  e.stopPropagation();
  if(!confirm('Eliminar esta tarea?'))return;
  tasks=tasks.filter(t=>t.id!==id);scheduleSave();
}

function editTask(id,e){
  e.stopPropagation();editingId=id;
  const t=tasks.find(t=>t.id===id);if(!t)return;
  rebuildSelects();
  document.getElementById('edit-input').value=t.text;
  document.getElementById('edit-cat').value=t.cat;
  document.getElementById('edit-assigned').value=t.assigned;
  document.getElementById('edit-urgent').checked=!!t.urgent;
  document.getElementById('edit-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('edit-input').focus(),100);
}
function closeEditModal(){document.getElementById('edit-overlay').classList.remove('show');editingId=null;}
function saveEdit(){
  const t=tasks.find(t=>t.id===editingId);if(!t)return;
  const v=document.getElementById('edit-input').value.trim();if(v)t.text=v;
  t.cat=document.getElementById('edit-cat').value;
  t.assigned=document.getElementById('edit-assigned').value;
  t.urgent=document.getElementById('edit-urgent').checked;
  closeEditModal();scheduleSave();
}

function addTask(){
  const inp=document.getElementById('new-input');const text=inp.value.trim();if(!text)return;
  const cat=document.getElementById('new-cat').value;
  const maxOrder=Math.max(-1,...tasks.filter(t=>t.cat===cat).map(t=>t.order||0));
  tasks.push({id:nextId++,text,cat,catLabel:'',assigned:document.getElementById('new-assigned').value,done:false,urgent:false,doneBy:'',order:maxOrder+1});
  inp.value='';scheduleSave();
}

function showAddSection(){
  editingSectionId=null;
  document.getElementById('section-modal-title').textContent='Nueva categoria';
  document.getElementById('section-input').value='';
  document.getElementById('section-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('section-input').focus(),100);
}
function editSection(id,e){
  e.stopPropagation();editingSectionId=id;
  const sec=sections.find(s=>s.id===id);if(!sec)return;
  document.getElementById('section-modal-title').textContent='Editar categoria';
  document.getElementById('section-input').value=sec.label;
  document.getElementById('section-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('section-input').focus(),100);
}
function closeSectionModal(){document.getElementById('section-overlay').classList.remove('show');document.getElementById('section-input').value='';editingSectionId=null;}
function saveSection(){
  const val=document.getElementById('section-input').value.trim();if(!val)return;
  if(editingSectionId){const sec=sections.find(s=>s.id===editingSectionId);if(sec)sec.label=val;}
  else sections.push({id:'c'+Date.now(),label:val,custom:true});
  closeSectionModal();rebuildSelects();scheduleSave();
}
function delSection(id,e){
  e.stopPropagation();
  if(!confirm('Eliminar esta categoria y sus tareas?'))return;
  sections=sections.filter(s=>s.id!==id);tasks=tasks.filter(t=>t.cat!==id);scheduleSave();
}

// DRAG MOUSE
function onDragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function onDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));dragId=null;dragOverId=null;}
function onDragOver(e,id){e.preventDefault();if(id===dragId)return;if(dragOverId!==id){document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));dragOverId=id;const el=document.querySelector('[data-id="'+id+'"]');if(el)el.classList.add('drag-over');}}
function onDrop(e,id){
  e.preventDefault();if(!dragId||dragId===id)return;
  const src=tasks.find(t=>t.id===dragId),dst=tasks.find(t=>t.id===id);
  if(!src||!dst||src.cat!==dst.cat)return;
  const ct=tasks.filter(t=>t.cat===src.cat).sort((a,b)=>(a.order||0)-(b.order||0));
  const si=ct.findIndex(t=>t.id===dragId),di=ct.findIndex(t=>t.id===id);
  ct.splice(si,1);ct.splice(di,0,src);ct.forEach((t,i)=>t.order=i);
  scheduleSave();
}

// DRAG TOUCH
function onTouchStart(e,id){
  if(e.target.closest('.icon-btn')||e.target.closest('.check-circle'))return;
  touchEl=e.currentTarget;dragId=id;
  touchEl._dragTimer=setTimeout(()=>{touchEl._dragging=true;touchEl.classList.add('dragging');},300);
}
function onTouchMove(e){
  if(!touchEl||!touchEl._dragging)return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  const cards=[...document.querySelectorAll('.task-card:not(.dragging)')];
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
  let best=null,bestD=Infinity;
  cards.forEach(c=>{const r=c.getBoundingClientRect(),cy=r.top+r.height/2,d=Math.abs(y-cy);if(d<bestD){bestD=d;best=c;}});
  if(best&&bestD<80){best.classList.add('drag-over');dragOverId=parseInt(best.dataset.id);}else dragOverId=null;
}
function onTouchEnd(e){
  if(!touchEl)return;
  clearTimeout(touchEl._dragTimer);
  if(touchEl._dragging&&dragOverId&&dragOverId!==dragId){
    const src=tasks.find(t=>t.id===dragId),dst=tasks.find(t=>t.id===dragOverId);
    if(src&&dst&&src.cat===dst.cat){
      const ct=tasks.filter(t=>t.cat===src.cat).sort((a,b)=>(a.order||0)-(b.order||0));
      const si=ct.findIndex(t=>t.id===dragId),di=ct.findIndex(t=>t.id===dragOverId);
      ct.splice(si,1);ct.splice(di,0,src);ct.forEach((t,i)=>t.order=i);
      scheduleSave();
    }
  }
  touchEl.classList.remove('dragging');touchEl._dragging=false;
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
  touchEl=null;dragId=null;dragOverId=null;render();
}

function render(){
  const done=tasks.filter(t=>t.done).length,total=tasks.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=done+' de '+total+' tareas completadas';
  document.getElementById('stats-label').textContent=pct+'%';
  const filtered=tasks.filter(t=>{
    if(currentFilter==='todas')return true;
    if(currentFilter==='pendientes')return!t.done;
    if(currentFilter==='urgente')return t.urgent;
    return t.assigned===currentFilter;
  });
  const bySec={};filtered.forEach(t=>{if(!bySec[t.cat])bySec[t.cat]=[];bySec[t.cat].push(t);});
  Object.keys(bySec).forEach(k=>bySec[k].sort((a,b)=>(a.order||0)-(b.order||0)));
  let html='';
  sections.forEach(sec=>{
    const arr=bySec[sec.id];if(!arr||!arr.length)return;
    const dBtn=sec.custom?`<button class="sec-btn" onclick="delSection('${sec.id}',event)">Eliminar</button>`:'';
    html+=`<div class="section-header">
      <span class="section-label">${sec.label}</span>
      <div class="section-actions">
        <button class="sec-btn" onclick="editSection('${sec.id}',event)">Editar</button>${dBtn}
      </div>
    </div>`;
    arr.forEach(t=>{
      const atag=t.assigned==='dany'?'<span class="tag tag-dany">Dany</span>':t.assigned==='sarah'?'<span class="tag tag-sarah">Sarah</span>':'<span class="tag tag-ambas">Ambas</span>';
      const utag=t.urgent?'<span class="tag tag-urgent">urgente</span>':'';
      const btag=t.doneBy?`<span class="tag-by">por ${t.doneBy}</span>`:'';
      html+=`<div class="task-card${t.done?' done':''}" data-id="${t.id}"
        draggable="true"
        ondragstart="onDragStart(event,${t.id})" ondragend="onDragEnd(event)"
        ondragover="onDragOver(event,${t.id})" ondrop="onDrop(event,${t.id})"
        ontouchstart="onTouchStart(event,${t.id})" ontouchmove="onTouchMove(event)" ontouchend="onTouchEnd(event)"
        onclick="toggle(${t.id})">
        <div class="drag-handle" onclick="event.stopPropagation()">
          <div class="drag-dot"></div><div class="drag-dot"></div><div class="drag-dot"></div>
        </div>
        <div class="check-circle" onclick="event.stopPropagation();toggle(${t.id})">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-body">
          <div class="task-text">${t.text}</div>
          <div class="task-tags">${atag}${utag}${btag}</div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="editTask(${t.id},event)">✏️</button>
          <button class="icon-btn" onclick="delTask(${t.id},event)">🗑</button>
        </div>
      </div>`;
    });
  });
  if(!html)html='<div class="empty">No hay tareas aqui<br><span style="font-size:12px">Agrega una tarea abajo</span></div>';
  document.getElementById('list').innerHTML=html;
}

document.getElementById('new-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addTask();}});
document.getElementById('edit-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveEdit();}});
document.getElementById('section-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveSection();}});
document.getElementById('list').addEventListener('touchmove',e=>{if(touchEl&&touchEl._dragging)e.preventDefault();},{passive:false});

const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isAndroid=/android/i.test(navigator.userAgent);
const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if((isIOS||isAndroid)&&!isStandalone)setTimeout(()=>document.getElementById('install-hint').classList.add('show'),3000);

init();
</script>
